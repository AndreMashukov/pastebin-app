resources:
  Resources:
    # --- Cognito UserPool + AppClient ---
    # (Authorizer is auto-generated by the `httpApi.authorizers` block in
    # serverless.yml — no `AWS::ApiGatewayV2::Authorizer` resource needed.)
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${opt:stage}-user-pool
        AutoVerifiedAttributes:
          - email
        MfaConfiguration: 'OFF'
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: true
            RequireUppercase: true
            TemporaryPasswordValidityDays: 7
        Schema:
          - Name: email
            AttributeDataType: String
            Mutable: true
            Required: true

    UserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        UserPoolId:
          Ref: CognitoUserPool
        ClientName: ${self:service}-${opt:stage}-app-client
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_PASSWORD_AUTH
          # DEV ONLY: ALLOW_ADMIN_USER_PASSWORD_AUTH enables admin-initiated
          # auth via boto3 for smoke testing. Remove in prod (SRP only).
          - ALLOW_ADMIN_USER_PASSWORD_AUTH
        PreventUserExistenceErrors: ENABLED

    # --- DDB pastes table (Single-Table Design) ---
    # pk = "PASTE#<pasteId>" (HASH), sk = "META" (RANGE)
    # GSI1 enables GET /me/pastes: ownerSub (HASH) + gsisk (RANGE)
    # GSI2 is sparse (only rows with expiresAt) — reaper queries by it
    # DDB stream (NEW_AND_OLD_IMAGES) feeds the trigger lambda.
    # TTL on expires_at — secondary metadata cleanup (design §5).
    PastesTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-${opt:stage}-pastes
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
          - AttributeName: ownerSub
            AttributeType: S
          - AttributeName: gsisk
            AttributeType: S
          - AttributeName: gsi2pk
            AttributeType: S
          - AttributeName: gsi2sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: gsi1
            KeySchema:
              - AttributeName: ownerSub
                KeyType: HASH
              - AttributeName: gsisk
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: gsi2
            KeySchema:
              - AttributeName: gsi2pk
                KeyType: HASH
              - AttributeName: gsi2sk
                KeyType: RANGE
            Projection:
              ProjectionType: KEYS_ONLY
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        TimeToLiveSpecification:
          AttributeName: expires_at
          Enabled: true

  Outputs:
    UserPoolId:
      Value:
        Ref: CognitoUserPool
    UserPoolArn:
      Value:
        Fn::GetAtt: [CognitoUserPool, Arn]
    UserPoolClientId:
      Value:
        Ref: UserPoolClient
    PastesTableName:
      Value:
        Ref: PastesTable
    PastesTableArn:
      Value:
        Fn::GetAtt: [PastesTable, Arn]
    PastesTableStreamArn:
      Value:
        Fn::GetAtt: [PastesTable, StreamArn]
    ApiEndpoint:
      Value:
        Fn::Sub: 'https://${HttpApi}.execute-api.${opt:region}.amazonaws.com'
    # ContentBucket* outputs are declared in s3.yml — they surface
    # under the same stack when synthesized.
