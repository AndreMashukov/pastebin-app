# IAM for the lean reads table. Used by both the read handlers
# (GetItem) and the listener (PutItem on PasteCreated, DeleteItem on
# PasteDeleted). The shared role covers both.

iamRoleStatements:
  Effect: Allow
  Action:
    - dynamodb:GetItem
    - dynamodb:PutItem
    - dynamodb:UpdateItem
    - dynamodb:DeleteItem
    - dynamodb:Query
    - dynamodb:Scan
  Resource:
    - Fn::GetAtt: [ReadsTable, Arn]
